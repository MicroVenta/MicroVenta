<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>MicroVenta | Catálogo de usuarios</title>
	<link rel="stylesheet" href="usuarios.css">
</head>
<body>
	<div class="dashboard">
		<aside class="sidebar">
			<div class="sidebar-brand">
				<img src="grafico/Logo_DM.png" alt="Dulce Mordisco" class="sidebar-logo">
				<div>
					<h2>Dulce Mordisco</h2>
					<p>MicroVenta</p>
				</div>
			</div>

			<nav class="sidebar-menu">
				<a href="#" class="menu-item active">👤 Usuarios</a>
				<a href="#" class="menu-item">🧁 Productos</a>
				<a href="#" class="menu-item">📦 Inventario</a>
				<a href="#" class="menu-item">🛒 Pedidos</a>
				<a href="#" class="menu-item">📊 Reportes</a>
			</nav>
		</aside>

		<main class="main-content">
			<header class="topbar">
				<div>
					<h1>Catálogo de usuarios</h1>
					<p>Administra los registros de la tabla Usuario.</p>
				</div>

				<div class="topbar-actions">
					<input type="text" id="searchInput" class="search-input" placeholder="Buscar usuario...">
					<button class="btn btn-primary" id="btnNuevoUsuario">+ Nuevo usuario</button>
				</div>
			</header>

			<section class="card table-card">
				<div class="table-responsive">
					<table>
						<thead>
							<tr>
								<th>ID</th>
								<th>Nombre completo</th>
								<th>Correo</th>
								<th>Rol</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody id="tablaUsuariosBody"></tbody>
					</table>
				</div>
			</section>
		</main>
	</div>

	<div class="modal hidden" id="modalUsuario">
		<div class="modal-backdrop" id="modalBackdrop"></div>

		<div class="modal-content">
			<div class="modal-header">
				<h2 id="modalTitle">Nuevo usuario</h2>
				<button class="btn-icon" id="btnCerrarModal">✕</button>
			</div>

			<form id="usuarioForm" class="modal-form">
				<input type="hidden" id="id_usuario">

				<div class="form-grid">
					<div class="form-group full-width">
						<label for="nombre_completo">Nombre completo</label>
						<input type="text" id="nombre_completo" required>
					</div>

					<div class="form-group full-width">
						<label for="correo">Correo</label>
						<input type="email" id="correo" required>
					</div>

					<div class="form-group full-width">
						<label for="contrasena">Contraseña</label>
						<input type="password" id="contrasena" required>
					</div>

					<div class="form-group full-width">
						<label for="id_rol">Rol</label>
						<select id="id_rol" required>
							<option value="">Selecciona un rol</option>
						</select>
					</div>
				</div>

				<div class="modal-actions">
					<button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
					<button type="submit" class="btn btn-primary">Guardar usuario</button>
				</div>
			</form>
		</div>
	</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="conexion.js"></script>
<script src="usuarios.js"></script>
</body>
</html>
